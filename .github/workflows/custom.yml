# Build TurBoTse's Padavan 4.4 Kernel

name: Custom Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select the router device'
        required: true
        type: choice
        options:
        - 360-T6M
        - 360-T6M-PB
        - B70
        - BELL-A040WQ
        - C-Life-XG1
        - CR660x
        - DIR-878
        - DIR-882
        - EA7500
        - G-AX1800
        - G-AX1800-B
        - GHL
        - HAR-20S2U1
        - JCG-836PRO
        - JCG-AC860M
        - JCG-Q10Pro
        - JCG-Q10Pro-PB
        - JCG-Q11Pro
        - JCG-Q20
        - JCG-Q20-PB
        - JCG-Y2
        - JDCLOUD-RE-CP-02
        - JDCLOUD-RE-SP-01B
        - K2P
        - K2P-NANO
        - K2P-USB
        - KOMI-A8
        - MI-4
        - MI-R3G
        - MI-R3P-PB
        - MI-R3P-SPI
        - MI-R3P
        - MI-R4A
        - MR2600
        - MSG1500
        - MSG1500-Z
        - NETGEAR-BZV
        - NETGEAR-R6800
        - NETGEAR-R7450
        - NEWIFI
        - NEWIFI3
        - QM-B1
        - R2100
        - RM2100
        - RT-AC85P
        - SIM-AX1800T
        - TX1801
        - WDR8620
        - WRL18M4GD
        - WE410443-TC
        - WIA3300-10
        - WR1200JS
        - XY-C1
        - ZTE-E8820S
        - ZTE-E8820V2
        - ZTT-RX6000
        default: K2P
      toolchain:
        description: 'Select the compilation toolchain'
        required: true
        type: choice
        options:
          - mipsel-linux-musl
          - mipsel-linux-uclibc
        default: mipsel-linux-uclibc
      cpufreq:
        description: 'Enable CPU Frequency overclock'
        type: boolean
        default: false
      mt7621_oc:
        description: 'MT7621 Overclock setting'
        type: choice
        options:
          - '0x312'
          - '0x362'
          - '0x372'
          - '0x3B2'
      plugins:
        description: 'JSON list of plugins'
        required: true
        type: string
        default: '{"ss":"y","v2ray":"n","xray":"y","trojan":"y","ssobfs":"y","smartdns":"y","vlmcsd":"y","ttyd":"n","iperf3":"n"}'
      customization:
        description: 'JSON list of custom settings'
        required: true
        type: string
        default: '{"lanip":"192.168.2.1","signaccount":"admin","signpassword":"admin","wifi2gssid":"Padavan","wifi2gpsk":"1234567890","wifi5gssid":"Padavan-5G","wifi5gpsk":"1234567890"}'
      nanoversion:
        description: 'Compile nano version'
        type: boolean
        default: true
      release:
        description: 'Upload to release'
        type: boolean
        default: true
      oldworkflow:
        description: 'Clean old workflows'
        type: boolean
        default: true

env:
  FIRMWARE_AUTHOR: TurBoTse
  ROOTDIR: ${{ github.workspace }}/trunk
  TOOLCHAIN_ROOT: ${{ github.workspace }}/toolchain/${{ inputs.toolchain }}
  TOOLCHAIN_URL: https://github.com/TurBoTse/padavan/releases/download/toolchain

jobs:
  build:
    name: Build (${{ inputs.target }}-${{ inputs.toolchain }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main
      - uses: hendrikmuhs/ccache-action@main
        with:
          key: ${{ inputs.target }}-${{ inputs.toolchain }}

      - uses: actions/setup-go@main
        with:
          go-version: '1.24.x'
          check-latest: true
          cache: false

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bison flex gperf help2man libtool-bin texinfo python3-docutils autopoint gettext ccache autoconf automake liblzma-dev libltdl-dev jq
          echo "BUILD_DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)" >> $GITHUB_ENV

      - name: Prepare toolchain
        run: |
          if [ ! -d "${{ env.TOOLCHAIN_ROOT }}/bin" ]; then
            mkdir -p "${{ env.TOOLCHAIN_ROOT }}"
            echo "⏬ Downloading toolchain..."
            curl -fL --progress-bar "${{ env.TOOLCHAIN_URL }}/${{ inputs.toolchain }}.tar.xz" | \
              tar -xJ -C "${{ env.TOOLCHAIN_ROOT }}"
            echo "✅ Toolchain is ready ${{ inputs.toolchain }}"
          else
            echo "ℹ️ Toolchain already exists, skipping download. ${{ inputs.toolchain }}"
          fi

      - name: Validate JSON inputs
        run: |
          jq empty <<< '${{ inputs.customization }}' || { echo "::error::Invalid JSON in customization"; exit 1; }
          jq empty <<< '${{ inputs.plugins }}' || { echo "::error::Invalid JSON in plugins"; exit 1; }

      - name: Check config file exists
        run: |
          config_file="configs/templates/${{ inputs.target }}.config"
          [ -f "$config_file" ] || { echo "::error::Missing config file: $config_file"; exit 1; }

      - name: Parse configuration inputs
        env:
          CUSTOM_JSON: ${{ inputs.customization }}
          PLUGINS_JSON: ${{ inputs.plugins }}
        run: |
          # Parse JSON inputs
          declare -A CUSTOM=()
          while IFS="=" read -r key value; do
            CUSTOM["$key"]="$value"
          done < <(jq -r 'to_entries|map("\(.key)=\(.value|tostring)")|.[]' <<< "$CUSTOM_JSON")

          declare -A PLUGINS=()
          while IFS="=" read -r key value; do
            PLUGINS["$key"]="$value"
          done < <(jq -r 'to_entries|map("\(.key)=\(.value|tostring)")|.[]' <<< "$PLUGINS_JSON")

          # Export environment variables
          {
            for key in "${!CUSTOM[@]}"; do
              echo "${key^^}=${CUSTOM[$key]}"
            done
            for key in "${!PLUGINS[@]}"; do
              echo "PLUGIN_${key^^}=${PLUGINS[$key]}"
            done
          } >> $GITHUB_ENV

          chmod +x ./custom/scripts/*.sh

      - name: Configure nano version
        if: inputs.nanoversion == true
        run: |
          cd "${{ env.ROOTDIR }}/configs/templates"
          config_file="${{ inputs.target }}.config"

          # Disable filesystems
          for fs in ANTFS FAT EXFAT EXT2 EXT3 EXT4 XFS FUSE SWAP; do
            sed -i "s/CONFIG_FIRMWARE_ENABLE_${fs}=y/CONFIG_FIRMWARE_ENABLE_${fs}=n/" "$config_file"
          done

          # Disable modules
          disable_modules=(
            UVC HID SERIAL AUDIO XFRM QOS IMQ IFB NFSD NFSC CIFS NTFS_3G 
            LPRD U2EC TCPDUMP HDPARM PARTED SMBD WINS SMBD_SYSLOG FTPD 
            RPL2TP EAP_PEAP HTTPS SFTP DROPBEAR_FAST_CODE OPENSSH OPENVPN 
            SSWAN OPENSSL_EC OPENSSL_EXE XUPNPD MINIDLNA FIREFLY FFMPEG_NEW 
            TRANSMISSION TRANSMISSION_WEB_CONTROL ARIA ARIA_WEB_CONTROL CURL 
            SCUTCLIENT GDUT_DRCOM DOGCOM MINIEAP NJIT_CLIENT SOFTETHERVPN_SERVER 
            SOFTETHERVPN_CLIENT SOFTETHERVPN_CMD VLMCSD TTYD LITE LRZSZ HTOP 
            NANO IPERF3 DUMP1090 RTL_SDR MTR SOCAT SRELAY MENTOHUST FRPC FRPS 
            REDSOCKS SHADOWSOCKS XRAY V2RAY TROJAN SSOBFS SINGBOX NAIVEPROXY 
            ADBYBY DNSFORWARDER SMARTDNS ADGUARDHOME ZEROTIER ALIDDNS DDNSTO 
            ALDRIVER SQM WIREGUARD
          )
          for mod in "${disable_modules[@]}"; do
            sed -i "s/CONFIG_FIRMWARE_INCLUDE_${mod}=y/CONFIG_FIRMWARE_INCLUDE_${mod}=n/" "$config_file"
          done

      - name: Apply configurations
        run: |
          cd "${{ env.ROOTDIR }}"

          bash ./custom/scripts/setip.sh "$LANIP" ./user/shared/src/defaults.h ./user/www/dict/CN.dict
          bash ./custom/scripts/setaccount.sh "$SIGNACCOUNT" "$SIGNPASSWORD" ./user/shared/src/defaults.h
          bash ./custom/scripts/setwifi.sh "$WIFI2GSSID" "$WIFI2GPSK" "$WIFI5GSSID" "$WIFI5GPSK" ./user/shared/src/defaults.h

          # Apply plugin configurations
          cp "configs/templates/${{ inputs.target }}.config" .config
          for key in "${!PLUGIN_@}"; do
            echo "CONFIG_FIRMWARE_INCLUDE_${key#PLUGIN_}=${!key}" >> .config
          done

          # CPU overclock
          if [[ "${{ inputs.cpufreq }}" == "true" ]]; then
            echo "CONFIG_FIRMWARE_INCLUDE_OC=y" >> .config
            echo "CONFIG_FIRMWARE_MT7621_OC=${{ inputs.mt7621_oc }}" >> .config
          fi

      - name: Build firmware
        run: |
          make -j$(nproc) "${{ inputs.target }}" TOOLCHAIN="${{ inputs.toolchain }}"

          # Generate firmware name
          firmware_parts=(
            "${{ env.FIRMWARE_AUTHOR }}"
            "${{ inputs.target }}"
            "4.4"
            "${{ inputs.toolchain }}"
            ${{ inputs.nanoversion && 'nano' || '' }}
            ${{ inputs.cpufreq && format('cpufreq-{0}', inputs.mt7621_oc) || '' }}
            "${{ env.BUILD_DATE }}"
          )
          mkdir -p "${{ env.ROOTDIR }}/output/"
          firmware_name=$(printf "%s\n" "${firmware_parts[@]}" | grep -v '^$' | tr '\n' '-' | sed 's/-$//')
          firmware_file="${firmware_name}.trx"
          for f in "${{ env.ROOTDIR }}"/images/*.trx; do
            mv -v "$f" "${{ env.ROOTDIR }}/output/${firmware_file}"
            break
          done

      - name: Print config.log on failure
        if: failure()
        run: |
          echo "============================="
          echo "💥 configure failed — config.log:"
          echo "============================="
          find . -name config.log -exec echo "--- {} ---" \; -exec cat {} \; || echo "No config.log found"

      - name: Upload config.log as artifact
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: config-log
          path: |
            **/config.log

      - uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.target }}-${{ inputs.toolchain }}-${{ env.BUILD_DATE }}
          path: ${{ env.ROOTDIR }}/output/*.trx
          retention-days: 7

      - uses: softprops/action-gh-release@master
        if: ${{ inputs.release }}
        with:
          tag_name: ${{ env.BUILD_DATE }}
          name: "${{ env.BUILD_DATE }}"
          files: ${{ env.ROOTDIR }}/output/*.trx

      - uses: Mattraks/delete-workflow-runs@main
        if: ${{ inputs.oldworkflow }}
        with:
          retain_days: 0
          keep_minimum_runs: 1
