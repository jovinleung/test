# Build TurBoTse's Padavan 4.4 Kernel

name: Custom Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select the router device'
        required: true
        type: choice
        options:
          - 360-T6M
          - 360-T6M-PB
          - B70
          - BELL-A040WQ
          - C-Life-XG1
          - CR660x
          - DIR-878
          - DIR-882
          - EA7500
          - G-AX1800
          - G-AX1800-B
          - GHL
          - HAR-20S2U1
          - JCG-836PRO
          - JCG-AC860M
          - JCG-Q10Pro
          - JCG-Q10Pro-PB
          - JCG-Q11Pro
          - JCG-Q20
          - JCG-Q20-PB
          - JCG-Y2
          - JDCLOUD-RE-CP-02
          - JDCLOUD-RE-SP-01B
          - K2P
          - K2P-NANO
          - K2P-USB
          - KOMI-A8
          - MI-4
          - MI-R3G
          - MI-R3P-PB
          - MI-R3P-SPI
          - MI-R3P
          - MI-R4A
          - MR2600
          - MSG1500
          - MSG1500-Z
          - NETGEAR-BZV
          - NETGEAR-R6800
          - NETGEAR-R7450
          - NEWIFI
          - NEWIFI3
          - QM-B1
          - R2100
          - RM2100
          - RT-AC85P
          - SIM-AX1800T
          - TX1801
          - WDR8620
          - WRL18M4GD
          - WE410443-TC
          - WIA3300-10
          - WR1200JS
          - XY-C1
          - ZTE-E8820S
          - ZTE-E8820V2
          - ZTT-RX6000
        default: K2P
      toolchain:
        description: 'Select the compilation toolchain'
        required: true
        type: choice
        options:
          - mipsel-linux-musl
          - mipsel-linux-uclibc
        default: mipsel-linux-musl
      cpufreq:
        description: 'CPU Frequency (MHz)'
        type: boolean
        default: false
      mt7621_oc:
        description: '1000Mhz=0x312 1100Mhz=0x362 1120Mhz=0x372 1200Mhz=0x3B2'
        type: choice
        options:
          - '0x312'
          - '0x362'
          - '0x372'
          - '0x3B2'
      plugins:
        description: 'JSON list of plugins (e.g. {"ss":"y","xray":"n"})'
        required: true
        type: string
        default: '{"ss":"y","v2ray":"n","xray":"y","trojan":"y","ssobfs":"y","smartdns":"y","vlmcsd":"y","ttyd":"n","iperf3":"n"}'
      customization:
        description: 'JSON list of custom settings'
        required: true
        type: string
        default: '{"lanip":"192.168.2.1","signaccount":"admin","signpassword":"admin","wifi2gssid":"Padavan","wifi2gpsk":"1234567890","wifi5gssid":"Padavan-5G","wifi5gpsk":"1234567890"}'
      nanoversion:
        description: 'Compile nano version'
        type: boolean
        default: true
      release:
        description: 'Upload to release'
        type: boolean
        default: true
      oldreleases:
        description: 'Delete old releases'
        type: boolean
        default: true
      oldworkflow:
        description: 'Clean old workflows'
        type: boolean
        default: true

env:
  FIRMWARE_AUTHOR: TurBoTse
  TOOLCHAIN_ROOT: ${{ github.workspace }}/toolchain/${{ inputs.toolchain }}
  TOOLCHAIN_URL: https://github.com/jovinleung/test/releases/download/toolchain
  TRUNKDIR: ${{ github.workspace }}/trunk
  CONFIG_FILE: configs/templates/${{ inputs.target }}.config

jobs:
  build:
    name: Build (${{ inputs.target }}-${{ inputs.toolchain }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@main
      - uses: hendrikmuhs/ccache-action@main
        with:
          key: ${{ inputs.target }}-${{ inputs.toolchain }}

      - uses: actions/setup-go@main
        with:
          go-version: '1.24.x'
          check-latest: true
          cache: false

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bison flex gperf help2man libtool-bin texinfo python3-docutils autopoint gettext ccache autoconf automake liblzma-dev libltdl-dev jq
          echo "BUILD_DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)" >> $GITHUB_ENV

      - name: Prepare Toolchain
        run: |
          echo "CONFIG_TOOLCHAIN=${{ inputs.toolchain }}" >> $GITHUB_ENV
          echo "CONFIG_CROSS_COMPILER_ROOT=$(pwd)/toolchain/${{ inputs.toolchain }}" >> $GITHUB_ENV
#          if [ ! -d "${{ env.TOOLCHAIN_ROOT }}/bin" ]; then
#            mkdir -p "${{ env.TOOLCHAIN_ROOT }}"
#            echo "⏬ Downloading toolchain..."
#            curl -fL --progress-bar "${{ env.TOOLCHAIN_URL }}/${{ inputs.toolchain }}.tar.xz" | \
#              tar -xJ -C "${{ env.TOOLCHAIN_ROOT }}"
#            echo "✅ Toolchain is ready ${{ inputs.toolchain }}"
#          fi

      - name: Validate JSON Inputs
        run: |
          if ! echo '${{ inputs.customization }}' | jq empty; then
            echo "❌ Invalid JSON in 'customization'" && exit 1
          fi
          if ! echo '${{ inputs.plugins }}' | jq empty; then
            echo "❌ Invalid JSON in 'plugins'" && exit 1
          fi

      - name: Parse and export config
        run: |
          CUSTOM_JSON='${{ inputs.customization }}'
          PLUGINS_JSON='${{ inputs.plugins }}'

          # ✅ nano 构建时禁用所有插件
          if [ "${{ inputs.nanoversion }}" = "true" ]; then
            echo "⚠️ Nano version selected — disabling all plugins."
            PLUGINS_JSON=$(echo "$PLUGINS_JSON" | jq 'with_entries(.value = "n")')
          fi

          declare -A CUSTOM PLUGINS
          while IFS="=" read -r k v; do CUSTOM["$k"]="$v"; done < <(echo "$CUSTOM_JSON" | jq -r 'to_entries|.[]|"\(.key)=\(.value)"')
          while IFS="=" read -r k v; do PLUGINS["$k"]="$v"; done < <(echo "$PLUGINS_JSON" | jq -r 'to_entries|.[]|"\(.key)=\(.value)"')

          for key in "${!CUSTOM[@]}"; do echo "${key^^}=${CUSTOM[$key]}" >> $GITHUB_ENV; done
          for key in "${!PLUGINS[@]}"; do echo "PLUGIN_${key^^}=${PLUGINS[$key]}" >> $GITHUB_ENV; done

      - name: Apply configurations
        run: |
          cd "${{ env.TRUNKDIR }}"
          [ -d ./custom/scripts ] && chmod +x ./custom/scripts/*.sh
          bash ./custom/scripts/setip.sh "$LANIP" ./user/shared/src/defaults.h ./user/www/dict/CN.dict
          bash ./custom/scripts/setaccount.sh "$SIGNACCOUNT" "$SIGNPASSWORD" ./user/shared/src/defaults.h
          bash ./custom/scripts/setwifi.sh "$WIFI2GSSID" "$WIFI2GPSK" "$WIFI5GSSID" "$WIFI5GPSK" ./user/shared/src/defaults.h

          sed -i '/^CONFIG_FIRMWARE_INCLUDE_/d' "${{ env.CONFIG_FILE }}"
          sed -i '/^CONFIG_FIRMWARE_ENABLE_/d' "${{ env.CONFIG_FILE }}"
          sed -i '/^CONFIG_FIRMWARE_MT7621_OC/d' "${{ env.CONFIG_FILE }}"
          sed -i '/^CONFIG_FIRMWARE_INCLUDE_OC/d' "${{ env.CONFIG_FILE }}"
          for key in $(env | grep '^PLUGIN_' | cut -d= -f1); do
            echo "CONFIG_FIRMWARE_INCLUDE_${key#PLUGIN_}=${!key}" >> "${{ env.CONFIG_FILE }}"
          done

          if [ "${{ inputs.cpufreq }}" = "true" ]; then
            echo "CONFIG_FIRMWARE_INCLUDE_OC=y" >> "${{ env.CONFIG_FILE }}"
            echo "CONFIG_FIRMWARE_MT7621_OC=${{ inputs.mt7621_oc }}" >> "${{ env.CONFIG_FILE }}"
          fi

      - name: Configure Nano Version
        if: ${{ inputs.nanoversion }}
        run: |
          cd "${{ env.TRUNKDIR }}"
          for fs in ANTFS FAT EXFAT EXT2 EXT3 EXT4 XFS FUSE SWAP; do
            sed -i "s/CONFIG_FIRMWARE_ENABLE_${fs}=y/CONFIG_FIRMWARE_ENABLE_${fs}=n/" "${{ env.CONFIG_FILE }}"
          done
          modules=(UVC HID SERIAL AUDIO XFRM QOS IMQ IFB NFSD NFSC CIFS NTFS_3G LPRD U2EC TCPDUMP HDPARM PARTED 
            SMBD WINS SMBD_SYSLOG FTPD RPL2TP EAP_PEAP HTTPS SFTP DROPBEAR DROPBEAR_FAST_CODE OPENSSH OPENVPN SSWAN 
            OPENSSL_EC OPENSSL_EXE XUPNPD MINIDLNA FIREFLY FFMPEG_NEW TRANSMISSION TRANSMISSION_WEB_CONTROL ARIA 
            ARIA_WEB_CONTROL CURL SCUTCLIENT GDUT_DRCOM DOGCOM MINIEAP NJIT_CLIENT SOFTETHERVPN_SERVER SOFTETHERVPN_CLIENT 
            SOFTETHERVPN_CMD VLMCSD TTYD MSD_LITE LRZSZ HTOP NANO IPERF3 DUMP1090 RTL_SDR MTR SOCAT SRELAY MENTOHUST 
            FRPC FRPS REDSOCKS SHADOWSOCKS XRAY V2RAY TROJAN SSOBFS SINGBOX NAIVEPROXY ADBYBY DNSFORWARDER SMARTDNS 
            ADGUARDHOME ZEROTIER ALIDDNS DDNSTO ALDRIVER SQM WIREGUARD )
          for m in "${modules[@]}"; do
            sed -i "s/CONFIG_FIRMWARE_INCLUDE_${m}=y/CONFIG_FIRMWARE_INCLUDE_${m}=n/" "${{ env.CONFIG_FILE }}"
          done

      - name: Build Firmware
        run: |
          make "${{ inputs.target }}" TOOLCHAIN="${{ inputs.toolchain }}"
          mkdir -p "$TRUNKDIR/output"
          base="${{ env.FIRMWARE_AUTHOR }}-${{ inputs.target }}-4.4-${{ inputs.toolchain }}"
          [ "${{ inputs.nanoversion }}" = "true" ] && base="$base-nano"
          [ "${{ inputs.cpufreq }}" = "true" ] && base="$base-cpufreq-${{ inputs.mt7621_oc }}"
          base="$base-${{ env.BUILD_DATE }}"
          i=1
          for f in "$TRUNKDIR"/images/*.trx; do
            suffix=""
            [ $i -gt 1 ] && suffix="-$i"
            mv "$f" "$TRUNKDIR/output/${base}${suffix}.trx"
            i=$((i+1))
          done

      - name: Print config.log on failure
        if: failure()
        run: |
          echo "===================" && echo "config.log content:"
          find . -name config.log -exec cat {} \; || echo "none"

      - uses: actions/upload-artifact@main
        if: failure()
        with:
          name: config-log
          path: '**/config.log'

      - uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.target }}-${{ inputs.toolchain }}-${{ env.BUILD_DATE }}
          path: ${{ env.TRUNKDIR }}/output/*.trx
          retention-days: 7

      - uses: softprops/action-gh-release@master
        if: ${{ inputs.release }}
        with:
          tag_name: ${{ env.BUILD_DATE }}
          name: ${{ env.BUILD_DATE }}
          files: ${{ env.TRUNKDIR }}/output/*.trx
          body: |
            ✅ Build Summary:
            - 📅 Date: ${{ env.BUILD_DATE }}
            - 📦 Target: ${{ inputs.target }}
            - 🔧 Toolchain: ${{ inputs.toolchain }}
            - 🔋 Nano: ${{ inputs.nanoversion }}
            - 🚀 CPU OC: ${{ inputs.cpufreq }} (${{ inputs.mt7621_oc }})
            - 🔌 Plugins: ${{ inputs.plugins }}
            - ⚙️ Customization: ${{ inputs.customization }}

      - uses: dev-drprasad/delete-older-releases@master
        if: ${{ inputs.oldreleases }}
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Mattraks/delete-workflow-runs@main
        if: ${{ inputs.oldworkflow }}
        with:
          retain_days: 0
          keep_minimum_runs: 1
