name: Build firmware

permissions:
  contents: write
  actions: write

on:
#  push:
#    branches:
#      - "*"
  workflow_dispatch:

jobs:
  build:
    name: Build 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [K2P]
        toolchain: [mipsel-linux-musl, mipsel-linux-uclibc]
    env:
      ROOTDIR: ${{ github.workspace }}/trunk

    steps:
      - uses: actions/checkout@main
      - uses: hendrikmuhs/ccache-action@main
        with:
          key: ${{ matrix.target }}-${{ matrix.toolchain }}

      - uses: actions/setup-go@main
        with:
          go-version: '1.24.x'
          check-latest: true
          cache: false

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bison flex gperf help2man libtool-bin texinfo python3-docutils autopoint gettext ccache autoconf automake liblzma-dev libltdl-dev
          echo "BUILD_DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)" >> $GITHUB_ENV

      - name: Build firmware
        run: |
          make -s --no-print-directory "${{ matrix.target }}" TOOLCHAIN="${{ matrix.toolchain }}"

      - uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.target }}-${{ matrix.toolchain }}-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ROOTDIR }}/images/*.trx
          retention-days: 7

      - uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ env.BUILD_DATE }}
          name: "${{ env.BUILD_DATE }}"
          files: ${{ env.ROOTDIR }}/images/*.trx

      - uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 1
